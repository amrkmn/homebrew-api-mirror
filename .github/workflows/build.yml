name: Build and Push

on:
  push:
    paths:
      - ".latest.artifact"
  workflow_dispatch:

env:
  REGISTRY: quay.io
  IMAGE_NAME: amrkmn/formulae-mirror

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract formulae artifact
        run: bun run extract
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set artifact tag
        id: artifact
        run: echo "version=$(cat .latest.artifact)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.artifact.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set tag expiration
        run: |
          QUAY_TOKEN=$(curl -s -u "${{ env.REGISTRY_USERNAME }}:${{ secrets.REGISTRY_PASSWORD }}" \
            -X POST "https://${{ env.REGISTRY }}/oauth/access_token" \
            -d "grant_type=client_credentials" | jq -r '.access_token')
          curl -s -X PUT \
            -H "Authorization: Bearer ${QUAY_TOKEN}" \
            "https://${{ env.REGISTRY }}/api/v1/repository/${{ env.IMAGE_NAME }}/tag/${{ steps.artifact.outputs.version }}/expiration" \
            -d '{"expiration": "30d"}'
