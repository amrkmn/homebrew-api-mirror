name: Sync Homebrew API

on:
    schedule:
        - cron: "*/30 * * * *"
    workflow_dispatch:

concurrency:
    group: homebrew-api-sync
    cancel-in-progress: false

jobs:
    sync:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Bun
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

            - name: Cache
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
              with:
                  path: /tmp/homebrew-api-cache
                  key: homebrew-artifact-cache-${{ github.run_id }}
                  restore-keys: |
                      homebrew-artifact-cache-

            - name: Sync to S3
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_PAT }}
                  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
                  S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
                  S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
                  S3_BUCKET: ${{ secrets.S3_BUCKET }}
                  S3_REGION: ${{ secrets.S3_REGION }}
                  S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
                  CACHE_DIR: /tmp/homebrew-api-cache
              run: bun run src/sync.ts
