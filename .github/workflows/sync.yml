name: Sync formulae-mirror

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: formulae-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache artifact zip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/formulae-mirror-cache
          key: formulae-mirror-cache-${{ github.run_id }}
          restore-keys: |
            formulae-mirror-cache-

      - name: Extract files
        id: sync
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CACHE_DIR: /tmp/formulae-mirror-cache
          OUTPUT_DIR: ./dist
        run: bun run src/sync.ts

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .latest.artifact
          git diff --cached --quiet || git commit -m "sync: artifact #${{ steps.sync.outputs.artifact_id }}"
          git push
